schema: 1
framework: Muster
project:
  name: bt-audio-gateway
  type: linux-service-appliance
  version_file: VERSION
  config_dir: /etc/bt-audio-gateway
  install_dir: /opt/bt-audio-gateway
  current_link: /opt/bt-audio-gateway/current
  release_dir: /opt/bt-audio-gateway/releases
architecture:
  summary: Snapserver to Raspberry Pi snapclient to PipeWire/Pulse sink to Bluetooth speaker.
  network_leg: Snapcast
  local_audio_leg: PipeWire/Pulse
  unreliable_local_leg: Bluetooth
lifecycle:
  manager: systemd
  update_polling: systemd-timer
  health_check: bin/doctor.sh
python:
  allowed: when shell becomes structurally worse for typed state, parsing, APIs, JSON, or orchestration
  required_tool: uv
release:
  artifact_prefix: bt-audio-gateway
  manifest: manifest.json
  checksum: sha256
compliance:
  readme_self_certification_required: true
  tests_required: true
