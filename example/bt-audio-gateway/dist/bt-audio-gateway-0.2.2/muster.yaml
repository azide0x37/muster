schema: 2
framework: Muster
project:
  name: bt-audio-gateway
  display_name: Bluetooth Audio Gateway
  type: linux-service-appliance
  version_file: VERSION
  config_dir: /etc/bt-audio-gateway
  install_dir: /opt/bt-audio-gateway
  current_link: /opt/bt-audio-gateway/current
  release_dir: /opt/bt-audio-gateway/releases
architecture:
  summary: Snapserver to Raspberry Pi snapclient to PipeWire/Pulse sink to Bluetooth speaker.
  network_leg: Snapcast
  local_audio_leg: PipeWire/Pulse
  unreliable_local_leg: Bluetooth
lifecycle:
  manager: systemd
  update_polling: systemd-timer
  health_check: bin/doctor.sh
patterns:
  source: https://github.com/azide0x37/muster-pattern-library/tree/main
  verified_head: ea6d02aaa6860e5102a760473b2ffe9b90d13c75
  primary: T2R1.bluetooth-audio-gateway
  coverage: partial
  limitation: Honest state-ledger and outward local-control surfaces remain partial.
python:
  allowed: when shell becomes structurally worse for typed state, parsing, APIs, JSON, or orchestration
  required_tool: uv
release:
  artifact_prefix: bt-audio-gateway
  manifest: manifest.json
  checksum: sha256
compliance:
  readme_self_certification_required: true
  tests_required: true
inspection:
  id: implementation:bt-audio-gateway
  summary: Keeps a Snapcast audio path attached to a specific Bluetooth speaker.
  literate:
    what: A small Linux audio appliance whose lifecycle and recovery are owned by systemd.
    why: Bluetooth is an unreliable last hop; the gateway makes that unreliability bounded and inspectable.
    responsibilities:
      - reconnect the configured Bluetooth speaker
      - route the local audio graph to the selected sink
      - keep snapclient and scheduled health checks under systemd
    failure_modes:
      - the configured Bluetooth device is absent or no longer trusted
      - the PipeWire or Pulse socket is unavailable for the audio user
      - the Snapserver cannot be reached
  root_components:
    - component:bt-audio-gateway:services
    - component:bt-audio-gateway:doctor
    - component:bt-audio-gateway:configuration
    - component:bt-audio-gateway:release
    - component:bt-audio-gateway:patterns
  components:
    - id: component:bt-audio-gateway:services
      kind: component.group
      summary: Services and timers owned by this implementation.
      children:
        - component:bt-audio-gateway:unit:bt-audio-watch.service
        - component:bt-audio-gateway:unit:snapclient-bt@.service
        - component:bt-audio-gateway:unit:bt-audio-doctor.service
        - component:bt-audio-gateway:unit:bt-audio-doctor.timer
        - component:bt-audio-gateway:unit:bt-audio-update.service
        - component:bt-audio-gateway:unit:bt-audio-update.timer
      literate:
        what: The complete systemd surface installed by the gateway.
        why: Lifecycle, retry, scheduling, and logging belong to systemd.
    - id: component:bt-audio-gateway:unit:bt-audio-watch.service
      kind: systemd.service
      summary: Watches and reconnects the configured Bluetooth audio device.
      source:
        adapter: systemd.unit
        unit: bt-audio-watch.service
        role: daemon
      literate:
        what: The long-running Bluetooth connection watcher.
        why: It confines unreliable device recovery to one restartable service.
        responsibilities:
          - reconnect the configured device
          - invoke audio routing after connection
        failure_modes:
          - BlueZ cannot see or trust the configured device
          - routing fails after the Bluetooth connection succeeds
    - id: component:bt-audio-gateway:unit:snapclient-bt@.service
      kind: systemd.template
      summary: Per-user Snapcast client bridged into the local audio graph.
      source:
        adapter: systemd.unit
        unit: snapclient-bt@.service
        role: template
        allow_inactive: true
      literate:
        what: A template instantiated for the configured audio user.
        why: User audio runtime ownership must remain explicit.
    - id: component:bt-audio-gateway:unit:bt-audio-doctor.service
      kind: systemd.service
      summary: Runs bounded gateway health checks.
      source:
        adapter: systemd.unit
        unit: bt-audio-doctor.service
        role: oneshot
        allow_inactive: true
      literate:
        what: A oneshot service that records gateway health as structured evidence.
        why: Periodic checks need a supervised execution boundary and durable logs.
    - id: component:bt-audio-gateway:unit:bt-audio-doctor.timer
      kind: systemd.timer
      summary: Schedules periodic health evidence.
      source:
        adapter: systemd.unit
        unit: bt-audio-doctor.timer
        role: timer
      literate:
        what: The persistent schedule for recurring gateway health observations.
        why: Bluetooth and audio health can drift after installation without an operator present.
    - id: component:bt-audio-gateway:unit:bt-audio-update.service
      kind: systemd.service
      summary: Performs one rollback-aware release update check.
      source:
        adapter: systemd.unit
        unit: bt-audio-update.service
        role: oneshot
        allow_inactive: true
      literate:
        what: A bounded service that evaluates and applies one reviewed gateway release.
        why: Updates need the same verification and rollback boundary as initial installation.
    - id: component:bt-audio-gateway:unit:bt-audio-update.timer
      kind: systemd.timer
      summary: Polls for reviewed releases on a persistent schedule.
      source:
        adapter: systemd.unit
        unit: bt-audio-update.timer
        role: timer
      literate:
        what: The persistent schedule that starts gateway update checks.
        why: Release polling should survive reboots without a resident updater process.
    - id: component:bt-audio-gateway:doctor
      kind: doctor
      summary: Latest structured runtime inspection of the gateway.
      source:
        adapter: observation.file
        state_file: /run/muster/bt-audio-gateway/observations/doctor.json
        max_age_seconds: 1800
        absent_status: unknown
      actions:
        - id: action:bt-audio-gateway:doctor.run
          label: Run doctor
          kind: doctor.run
          command:
            - /opt/bt-audio-gateway/current/bin/doctor.sh
            - --runtime
          requires_root: true
      literate:
        what: Evidence from configuration, systemd, Bluetooth, audio, and network checks.
        why: A green service process is not proof that sound can reach the speaker.
    - id: component:bt-audio-gateway:configuration
      kind: component.group
      summary: Preserved operator configuration.
      children:
        - component:bt-audio-gateway:config:environment
      literate:
        what: The operator-owned settings that bind this gateway to its speaker and Snapserver.
        why: Machine-specific identity must survive immutable release replacement.
    - id: component:bt-audio-gateway:config:environment
      kind: config.file
      summary: Bluetooth identity, audio user, and Snapserver settings.
      source:
        adapter: metadata.file
        path: /etc/bt-audio-gateway/bt-audio-gateway.env
        required: true
      literate:
        what: The root-managed environment file consumed by owned units.
        why: Configuration is preserved outside immutable releases.
    - id: component:bt-audio-gateway:release
      kind: release.current
      summary: Atomically selected active gateway release.
      source:
        adapter: release.current
        path: /opt/bt-audio-gateway/current
        required: true
      literate:
        what: The only moving pointer in the versioned install layout.
        why: Updates can roll back by restoring one symlink.
    - id: component:bt-audio-gateway:patterns
      kind: pattern.tree
      summary: Resolved MPL shape and current coverage claim.
      metadata:
        source_commit: ea6d02aaa6860e5102a760473b2ffe9b90d13c75
        coverage: partial
      children:
        - pattern:bt-audio-gateway:T2R1.bluetooth-audio-gateway
      literate:
        what: The reusable operational vocabulary this implementation claims.
        why: It explains the intended machine shape without inventing project-only nouns.
    - id: pattern:bt-audio-gateway:T2R1.bluetooth-audio-gateway
      kind: pattern.rare
      summary: Bluetooth Audio Gateway
      metadata:
        maturity: draft
        coverage: partial
        reason: Reconnection and device binding exist; the full R4 state ledger remains incomplete.
      source:
        adapter: pattern
        status: degraded
      children:
        - pattern:bt-audio-gateway:T2C4.self-healing-reconnector
        - pattern:bt-audio-gateway:T2C5.local-sidecar-bridge
        - pattern:bt-audio-gateway:R2.device-binding
        - pattern:bt-audio-gateway:R4.state-ledger
      literate:
        what: The rare pattern describing this Snapcast-to-Bluetooth appliance shape.
        why: It names the combined device binding, reconnection, sidecar, and state obligations.
    - id: pattern:bt-audio-gateway:T2C4.self-healing-reconnector
      kind: pattern.common
      summary: Self-Healing Reconnector
      metadata:
        coverage: complete
      source:
        adapter: pattern
      children:
        - pattern:bt-audio-gateway:C1.service-capsule
        - pattern:bt-audio-gateway:C2.persistent-tick
        - pattern:bt-audio-gateway:C5.failure-ratchet
      literate:
        what: The reusable reconnection pattern implemented by the Bluetooth watcher.
        why: The speaker can disappear transiently, so recovery must be automatic and bounded.
    - id: pattern:bt-audio-gateway:T2C5.local-sidecar-bridge
      kind: pattern.common
      summary: Local Sidecar Bridge
      metadata:
        coverage: partial
      source:
        adapter: pattern
      children:
        - pattern:bt-audio-gateway:C1.service-capsule
        - pattern:bt-audio-gateway:C2.persistent-tick
        - pattern:bt-audio-gateway:C5.failure-ratchet
      literate:
        what: The pattern for bridging Snapcast into the host audio graph beside the watcher.
        why: Network audio transport and local Bluetooth recovery need separate lifecycle owners.
    - id: pattern:bt-audio-gateway:R2.device-binding
      kind: pattern.rare
      summary: Device Binding
      metadata:
        coverage: complete
      source:
        adapter: pattern
      literate:
        what: The binding between this gateway and one configured Bluetooth device identity.
        why: Recovery must target the intended speaker rather than any nearby audio device.
    - id: pattern:bt-audio-gateway:R4.state-ledger
      kind: pattern.rare
      summary: State Ledger
      metadata:
        coverage: partial
        limitation: Structured doctor evidence exists, but complete runtime routing state remains future work.
      source:
        adapter: pattern
        status: degraded
      literate:
        what: The partially implemented record of gateway health and routing state.
        why: Operators need durable facts about failures even when the watcher later recovers.
    - id: pattern:bt-audio-gateway:C1.service-capsule
      kind: pattern.common
      summary: Service Capsule
      metadata:
        coverage: complete
      source:
        adapter: pattern
      literate:
        what: The systemd service boundary around one gateway responsibility.
        why: Supervision, logging, restart policy, and ownership belong in a standard capsule.
    - id: pattern:bt-audio-gateway:C2.persistent-tick
      kind: pattern.common
      summary: Persistent Tick
      metadata:
        coverage: complete
      source:
        adapter: pattern
      literate:
        what: The persistent timer mechanism used for doctor and update work.
        why: Scheduled obligations must resume after downtime without a polling daemon.
    - id: pattern:bt-audio-gateway:C5.failure-ratchet
      kind: pattern.common
      summary: Failure Ratchet
      metadata:
        coverage: partial
      source:
        adapter: pattern
      literate:
        what: The partial pattern for retaining actionable gateway failure evidence.
        why: Repeated Bluetooth faults should remain visible instead of vanishing after restart.
  edges:
    - from: component:bt-audio-gateway:unit:snapclient-bt@.service
      relation: depends_on
      to: component:bt-audio-gateway:unit:bt-audio-watch.service
      summary: Audio transport waits for the Bluetooth path.
    - from: component:bt-audio-gateway:doctor
      relation: observes
      to: component:bt-audio-gateway:services
    - from: component:bt-audio-gateway:unit:bt-audio-watch.service
      relation: implements
      to: pattern:bt-audio-gateway:T2C4.self-healing-reconnector
    - from: component:bt-audio-gateway:unit:bt-audio-watch.service
      relation: implements
      to: pattern:bt-audio-gateway:R2.device-binding
