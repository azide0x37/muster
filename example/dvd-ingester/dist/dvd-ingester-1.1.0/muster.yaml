schema: 2
framework: Muster
project:
  name: dvd-ingester
  type: linux-service-appliance
  version_file: VERSION
  config_dir: /etc/dvd-ingester
  install_dir: /opt/dvd-ingester
  current_link: /opt/dvd-ingester/current
  release_dir: /opt/dvd-ingester/releases
architecture:
  summary: DVD readiness to bounded rip job, hot local handoff, and atomic cold publish.
  network_leg: none
  local_plumbing_leg: optical drive and mounted filesystem
  unreliable_local_leg: removable optical media
  lifecycle_owner: systemd
  hot_storage: /var/cache/dvd-ingester/hot
  cold_storage: configured mounted destination
  homeassistant_bridge: MQTT discovery and bounded controls
lifecycle:
  manager: systemd
  update_polling: systemd-timer
  health_check: bin/doctor.sh
patterns:
  source: https://github.com/azide0x37/muster-pattern-library/tree/main
  verified_head: 279573b65c7c72e6b3d4fb96e9d69edfc7f86aaf
  primary: T2R4.device-triggered-conveyor
  integrations:
    - T2R6.home-assistant-mqtt-bridge
  required_atoms:
    - C1.service-capsule
    - C2.persistent-tick
    - C4.lazy-resource-gate
    - C5.failure-ratchet
    - C6.lifecycle-capsule
    - R2.device-binding
    - R5.capability-mount
    - T2C1.hot-cold-nas-conveyor
    - T2C3.scheduled-herald
    - T2R6.home-assistant-mqtt-bridge
  mapping:
    device_binding:
      atom: R2.device-binding
      evidence:
        - udev/90-dvd-ingester.rules
        - systemd/dvd-rip@.service
    capability_mount:
      atom: R5.capability-mount
      evidence:
        - DEST_DIR
        - findmnt
        - src/dvd-rip-one
        - src/dvd-publish-one
    hot_cold_conveyor:
      atom: T2C1.hot-cold-nas-conveyor
      evidence:
        - HOT_DIR
        - MIN_HOT_FREE_BYTES
        - src/dvd-publish-one
    scheduled_work:
      atoms:
        - C2.persistent-tick
        - T2C3.scheduled-herald
      evidence:
        - systemd/dvd-publish-one.timer
        - systemd/dvd-ingester-doctor.timer
        - systemd/dvd-ingester-update.timer
    failure_state:
      atom: C5.failure-ratchet
      evidence:
        - capability.json
        - hot-capacity.json
        - rip.json
        - handoff.json
        - publish.json
    homeassistant_mqtt_bridge:
      atom: T2R6.home-assistant-mqtt-bridge
      evidence:
        - src/dvd-ha-mqtt-bridge
        - src/dvd-control
        - systemd/dvd-ingester-ha-mqtt.service
        - systemd/dvd-ingester-ha-mqtt.timer
        - dvd-ingester.mqtt.env
python:
  allowed: when title selection or metadata handling becomes structurally worse in shell
  required_tool: uv
release:
  artifact_prefix: dvd-ingester
  manifest: manifest.json
  checksum: sha256
compliance:
  readme_self_certification_required: true
  tests_required: true
  staged_installer_required: true
  package_required: true
inspection:
  id: implementation:dvd-ingester
  summary: Turns a ready optical disc into a bounded local rip and atomic cold-storage publication.
  literate:
    what: A device-triggered ingest appliance with explicit hot-storage, cold-storage, and Home Assistant boundaries.
    why: Long media work must survive unreliable devices and storage without becoming an opaque shell-script chain.
    responsibilities:
      - bind optical-device readiness to one bounded systemd job
      - preserve local work until cold storage is proven and writable
      - publish operational state and bounded controls through MQTT
    failure_modes:
      - optical media cannot be read or fingerprinted
      - hot local capacity falls below the configured safety margin
      - cold storage is unavailable or loses capability during publication
      - MQTT is enabled but the broker cannot be reached
  root_components:
    - component:dvd-ingester:services
    - component:dvd-ingester:state
    - component:dvd-ingester:doctor
    - component:dvd-ingester:configuration
    - component:dvd-ingester:release
    - component:dvd-ingester:patterns
  components:
    - id: component:dvd-ingester:services
      kind: component.group
      summary: Units and device trigger owned by the implementation.
      children:
        - component:dvd-ingester:udev:optical-trigger
        - component:dvd-ingester:unit:dvd-rip@.service
        - component:dvd-ingester:unit:dvd-publish-one.service
        - component:dvd-ingester:unit:dvd-publish-one.timer
        - component:dvd-ingester:unit:dvd-ingester-ha-mqtt.service
        - component:dvd-ingester:unit:dvd-ingester-ha-mqtt.timer
        - component:dvd-ingester:unit:dvd-ingester-doctor.service
        - component:dvd-ingester:unit:dvd-ingester-doctor.timer
        - component:dvd-ingester:unit:dvd-ingester-update.service
        - component:dvd-ingester:unit:dvd-ingester-update.timer
      literate:
        what: The complete lifecycle surface that turns device events into managed work.
        why: udev only signals readiness; systemd owns every long-running or scheduled action.
    - id: component:dvd-ingester:udev:optical-trigger
      kind: udev.rule
      summary: Delegates optical-media readiness to the rip service template.
      source:
        adapter: metadata.file
        path: /etc/udev/rules.d/90-dvd-ingester.rules
        required: true
      literate:
        what: The udev rule that turns a ready optical drive into a systemd job request.
        why: Device discovery must stay brief and delegate long extraction work immediately.
    - id: component:dvd-ingester:unit:dvd-rip@.service
      kind: systemd.template
      summary: One bounded extraction job for one optical device.
      source:
        adapter: systemd.unit
        unit: dvd-rip@.service
        role: template
        allow_inactive: true
      literate:
        what: A parameterized oneshot service invoked for a ready drive.
        why: Device events remain short while extraction gets systemd supervision and logs.
    - id: component:dvd-ingester:unit:dvd-publish-one.service
      kind: systemd.service
      summary: Moves one completed hot item to cold storage atomically.
      source:
        adapter: systemd.unit
        unit: dvd-publish-one.service
        role: oneshot
        allow_inactive: true
      literate:
        what: A oneshot worker that publishes one completed handoff to cold storage.
        why: One-item atomic moves keep retries bounded and prevent partial library entries.
    - id: component:dvd-ingester:unit:dvd-publish-one.timer
      kind: systemd.timer
      summary: Persists the hot-to-cold drain obligation across downtime.
      source:
        adapter: systemd.unit
        unit: dvd-publish-one.timer
        role: timer
      literate:
        what: The persistent schedule that drains completed hot-storage handoffs.
        why: Cold storage may return after an outage, so publication must retry after downtime.
    - id: component:dvd-ingester:unit:dvd-ingester-ha-mqtt.service
      kind: systemd.service
      summary: Publishes one Home Assistant discovery and state refresh.
      source:
        adapter: systemd.unit
        unit: dvd-ingester-ha-mqtt.service
        role: oneshot
        allow_inactive: true
      literate:
        what: A oneshot projection of ingester discovery, state, and bounded controls to MQTT.
        why: Home Assistant integration should observe the appliance without owning its workflow.
    - id: component:dvd-ingester:unit:dvd-ingester-ha-mqtt.timer
      kind: systemd.timer
      summary: Refreshes the bounded MQTT bridge state.
      source:
        adapter: systemd.unit
        unit: dvd-ingester-ha-mqtt.timer
        role: timer
      literate:
        what: The persistent schedule for refreshing the Home Assistant MQTT projection.
        why: Discovery and retained state must be republished after broker or host downtime.
    - id: component:dvd-ingester:unit:dvd-ingester-doctor.service
      kind: systemd.service
      summary: Produces one structured runtime health observation.
      source:
        adapter: systemd.unit
        unit: dvd-ingester-doctor.service
        role: oneshot
        allow_inactive: true
      literate:
        what: A oneshot service that records appliance checks as a Muster observation.
        why: Health evidence needs a supervised execution boundary and durable journal context.
    - id: component:dvd-ingester:unit:dvd-ingester-doctor.timer
      kind: systemd.timer
      summary: Schedules recurring runtime evidence.
      source:
        adapter: systemd.unit
        unit: dvd-ingester-doctor.timer
        role: timer
      literate:
        what: The persistent schedule for recurring ingester health observations.
        why: Storage, devices, and configuration can drift when no ingest job is running.
    - id: component:dvd-ingester:unit:dvd-ingester-update.service
      kind: systemd.service
      summary: Performs one verified, rollback-gated release update.
      source:
        adapter: systemd.unit
        unit: dvd-ingester-update.service
        role: oneshot
        allow_inactive: true
      literate:
        what: A bounded service that verifies, switches, and health-gates one release update.
        why: An invalid release must restore the prior graph and executable atomically.
    - id: component:dvd-ingester:unit:dvd-ingester-update.timer
      kind: systemd.timer
      summary: Polls for reviewed releases on a persistent schedule.
      source:
        adapter: systemd.unit
        unit: dvd-ingester-update.timer
        role: timer
      literate:
        what: The persistent schedule that starts reviewed release checks.
        why: Update polling should survive reboots without a resident updater process.
    - id: component:dvd-ingester:state
      kind: component.group
      summary: Inspectable operational facts emitted by bounded workers.
      children:
        - component:dvd-ingester:state:rip
        - component:dvd-ingester:state:handoff
        - component:dvd-ingester:state:publish
        - component:dvd-ingester:state:ha-mqtt
      literate:
        what: Transitional legacy JSON facts under the implementation runtime directory.
        why: The TUI can expose current work without understanding DVD-specific phases.
    - id: component:dvd-ingester:state:rip
      kind: state.legacy-json
      summary: Current or most recent extraction state.
      source:
        adapter: legacy.json
        path: /run/dvd-ingester/rip.json
        absent_status: healthy
        max_age_seconds: 43200
        status_field: state
        status_map:
          active: healthy
          completed: healthy
          failed: unhealthy
      literate:
        what: The latest bounded extraction state emitted by the rip worker.
        why: Operators need to distinguish active, completed, and failed media reads.
    - id: component:dvd-ingester:state:handoff
      kind: state.legacy-json
      summary: Hot-storage handoff readiness.
      source:
        adapter: legacy.json
        path: /run/dvd-ingester/handoff.json
        absent_status: healthy
        max_age_seconds: 86400
      literate:
        what: The durable-local fact that completed media is ready for cold publication.
        why: Rip completion and cold-storage availability are independent failure boundaries.
    - id: component:dvd-ingester:state:publish
      kind: state.legacy-json
      summary: Most recent cold-storage publish result.
      source:
        adapter: legacy.json
        path: /run/dvd-ingester/publish.json
        absent_status: healthy
        max_age_seconds: 86400
        status_field: state
        status_map:
          published: healthy
          idle: healthy
          failed: unhealthy
      literate:
        what: The most recent result from moving one handoff into cold storage.
        why: Publication failures must remain inspectable without rerunning the extraction.
    - id: component:dvd-ingester:state:ha-mqtt
      kind: state.legacy-json
      summary: Last Home Assistant bridge projection.
      source:
        adapter: legacy.json
        path: /run/dvd-ingester/ha-mqtt-state.json
        absent_status: healthy
        max_age_seconds: 300
        status_field: health
        status_map:
          healthy: healthy
          degraded: degraded
          failed: unhealthy
      literate:
        what: The latest state and health projection produced for Home Assistant.
        why: MQTT visibility must be diagnosable separately from the ingest conveyor itself.
    - id: component:dvd-ingester:doctor
      kind: doctor
      summary: Latest structured runtime inspection of the whole appliance.
      source:
        adapter: observation.file
        state_file: /run/muster/dvd-ingester/observations/doctor.json
        max_age_seconds: 7200
        absent_status: unknown
      actions:
        - id: action:dvd-ingester:doctor.run
          label: Run doctor
          kind: doctor.run
          command:
            - /opt/dvd-ingester/current/bin/doctor.sh
            - --runtime
          requires_root: true
      literate:
        what: Timestamped evidence about installed units, configuration, state freshness, and storage capability.
        why: Doctor is evidence in the graph, not a privileged special page.
    - id: component:dvd-ingester:configuration
      kind: component.group
      summary: Preserved operator configuration surfaces.
      children:
        - component:dvd-ingester:config:environment
        - component:dvd-ingester:config:mqtt
      literate:
        what: The operator-owned ingest, storage, and MQTT settings preserved across releases.
        why: Machine-specific policy and credentials must remain outside immutable artifacts.
    - id: component:dvd-ingester:config:environment
      kind: config.file
      summary: Ingest, capacity, and destination settings.
      source:
        adapter: metadata.file
        path: /etc/dvd-ingester/dvd-ingester.env
        required: true
      literate:
        what: The root-managed settings for devices, hot capacity, and cold destination.
        why: Safety margins and storage paths are host policy rather than release contents.
    - id: component:dvd-ingester:config:mqtt
      kind: config.file
      summary: Home Assistant MQTT settings and credentials.
      source:
        adapter: metadata.file
        path: /etc/dvd-ingester/dvd-ingester.mqtt.env
        required: true
      literate:
        what: The protected broker and discovery configuration for the Home Assistant bridge.
        why: MQTT credentials require tighter ownership and an independent integration boundary.
    - id: component:dvd-ingester:release
      kind: release.current
      summary: Atomically selected active DVD Ingester release.
      source:
        adapter: release.current
        path: /opt/dvd-ingester/current
        required: true
      literate:
        what: The active immutable release selected by one symlink.
        why: Failed doctor evidence can roll an update back without mutating either release.
    - id: component:dvd-ingester:patterns
      kind: pattern.tree
      summary: Exact T2R4 and T2R6 pattern closure at the verified MPL commit.
      metadata:
        source_commit: 279573b65c7c72e6b3d4fb96e9d69edfc7f86aaf
        closure_nodes: "13"
      children:
        - pattern:dvd-ingester:T2R4.device-triggered-conveyor
        - pattern:dvd-ingester:T2R6.home-assistant-mqtt-bridge
      literate:
        what: The locked Muster pattern closure claimed by this ingester release.
        why: Operators should see the reusable design obligations behind the installed components.
    - id: pattern:dvd-ingester:T2R4.device-triggered-conveyor
      kind: pattern.rare
      summary: Device-Triggered Conveyor
      metadata:
        role: primary
        coverage: complete
        maturity: stable
      source: {adapter: pattern}
      children:
        - pattern:dvd-ingester:C1.service-capsule
        - pattern:dvd-ingester:C2.persistent-tick
        - pattern:dvd-ingester:C4.lazy-resource-gate
        - pattern:dvd-ingester:C5.failure-ratchet
        - pattern:dvd-ingester:C6.lifecycle-capsule
        - pattern:dvd-ingester:R2.device-binding
        - pattern:dvd-ingester:R5.capability-mount
        - pattern:dvd-ingester:T2C1.hot-cold-nas-conveyor
        - pattern:dvd-ingester:T2C3.scheduled-herald
      literate:
        what: The primary pattern connecting optical readiness to bounded rip and publication work.
        why: Removable media and cold storage require explicit handoffs between unreliable stages.
    - id: pattern:dvd-ingester:T2R6.home-assistant-mqtt-bridge
      kind: pattern.rare
      summary: Home Assistant MQTT Bridge
      metadata:
        role: integration
        coverage: complete
        maturity: usable
      source: {adapter: pattern}
      children:
        - pattern:dvd-ingester:C1.service-capsule
        - pattern:dvd-ingester:C2.persistent-tick
        - pattern:dvd-ingester:C5.failure-ratchet
        - pattern:dvd-ingester:C6.lifecycle-capsule
        - pattern:dvd-ingester:R4.state-ledger
        - pattern:dvd-ingester:T2C5.local-sidecar-bridge
      literate:
        what: The integration pattern projecting appliance state and bounded controls through MQTT.
        why: Home Assistant should integrate through a sidecar contract rather than own core work.
    - id: pattern:dvd-ingester:T2C1.hot-cold-nas-conveyor
      kind: pattern.common
      summary: Hot/Cold NAS Conveyor
      metadata: {coverage: complete}
      source: {adapter: pattern}
      children:
        - pattern:dvd-ingester:C1.service-capsule
        - pattern:dvd-ingester:C2.persistent-tick
        - pattern:dvd-ingester:C4.lazy-resource-gate
        - pattern:dvd-ingester:C5.failure-ratchet
      literate:
        what: The conveyor that buffers completed media locally before atomic cold publication.
        why: Extraction must finish safely even when the configured NAS is temporarily absent.
    - id: pattern:dvd-ingester:T2C3.scheduled-herald
      kind: pattern.common
      summary: Scheduled Herald
      metadata: {coverage: complete}
      source: {adapter: pattern}
      children:
        - pattern:dvd-ingester:C1.service-capsule
        - pattern:dvd-ingester:C2.persistent-tick
        - pattern:dvd-ingester:C5.failure-ratchet
      literate:
        what: The scheduled pattern used to announce health, updates, and bridge state.
        why: Recurring obligations need visible timers and bounded oneshot workers.
    - id: pattern:dvd-ingester:T2C5.local-sidecar-bridge
      kind: pattern.common
      summary: Local Sidecar Bridge
      metadata: {coverage: complete}
      source: {adapter: pattern}
      children:
        - pattern:dvd-ingester:C1.service-capsule
        - pattern:dvd-ingester:C2.persistent-tick
        - pattern:dvd-ingester:C5.failure-ratchet
      literate:
        what: The sidecar pattern that translates local runtime facts into MQTT messages.
        why: Broker failures must not block or reshape the core ingest conveyor.
    - id: pattern:dvd-ingester:C1.service-capsule
      kind: pattern.common
      summary: Service Capsule
      metadata: {coverage: complete}
      source: {adapter: pattern}
      literate:
        what: The systemd service boundary around one ingester responsibility.
        why: Supervision, logging, privileges, and restart behavior need an explicit owner.
    - id: pattern:dvd-ingester:C2.persistent-tick
      kind: pattern.common
      summary: Persistent Tick
      metadata: {coverage: complete}
      source: {adapter: pattern}
      literate:
        what: The persistent timer mechanism behind publish, doctor, bridge, and update work.
        why: Scheduled obligations must resume after downtime without polling daemons.
    - id: pattern:dvd-ingester:C4.lazy-resource-gate
      kind: pattern.common
      summary: Lazy Resource Gate
      metadata: {coverage: complete}
      source: {adapter: pattern}
      literate:
        what: The gate that checks hot capacity and cold-storage capability only when needed.
        why: Optional or intermittent storage must not become a permanent startup dependency.
    - id: pattern:dvd-ingester:C5.failure-ratchet
      kind: pattern.common
      summary: Failure Ratchet
      metadata: {coverage: complete}
      source: {adapter: pattern}
      literate:
        what: The retained state and evidence that keep conveyor failures visible.
        why: A later successful timer run must not erase the reason earlier work stopped.
    - id: pattern:dvd-ingester:C6.lifecycle-capsule
      kind: pattern.common
      summary: Lifecycle Capsule
      metadata: {coverage: complete}
      source: {adapter: pattern}
      literate:
        what: The versioned install, atomic current link, and rollback lifecycle contract.
        why: Releases must switch as one unit while operator configuration remains preserved.
    - id: pattern:dvd-ingester:R2.device-binding
      kind: pattern.rare
      summary: Device Binding
      metadata: {coverage: complete}
      source: {adapter: pattern}
      literate:
        what: The binding from a ready optical-device event to its parameterized rip job.
        why: Each removable drive event must start exactly the work for that device.
    - id: pattern:dvd-ingester:R4.state-ledger
      kind: pattern.rare
      summary: State Ledger
      metadata: {coverage: partial, limitation: Legacy runtime facts are migrating to observation envelopes.}
      source: {adapter: pattern}
      literate:
        what: The partially modernized record of rip, handoff, publish, bridge, and doctor facts.
        why: Cross-stage progress and failure evidence must survive individual process exits.
    - id: pattern:dvd-ingester:R5.capability-mount
      kind: pattern.rare
      summary: Capability Mount
      metadata: {coverage: complete}
      source: {adapter: pattern}
      literate:
        what: The verified cold-storage capability required immediately before publication.
        why: A configured path is not proof that the intended mounted destination is usable.
  edges:
    - from: component:dvd-ingester:udev:optical-trigger
      relation: produces
      to: component:dvd-ingester:unit:dvd-rip@.service
      summary: Device readiness produces one bounded rip job.
    - from: component:dvd-ingester:unit:dvd-rip@.service
      relation: produces
      to: component:dvd-ingester:state:rip
    - from: component:dvd-ingester:unit:dvd-rip@.service
      relation: produces
      to: component:dvd-ingester:state:handoff
    - from: component:dvd-ingester:unit:dvd-publish-one.service
      relation: consumes
      to: component:dvd-ingester:state:handoff
    - from: component:dvd-ingester:unit:dvd-publish-one.service
      relation: produces
      to: component:dvd-ingester:state:publish
    - from: component:dvd-ingester:unit:dvd-ingester-ha-mqtt.service
      relation: observes
      to: component:dvd-ingester:state
    - from: component:dvd-ingester:doctor
      relation: observes
      to: component:dvd-ingester:services
    - from: component:dvd-ingester:doctor
      relation: observes
      to: component:dvd-ingester:state
    - from: component:dvd-ingester:udev:optical-trigger
      relation: implements
      to: pattern:dvd-ingester:R2.device-binding
    - from: component:dvd-ingester:unit:dvd-publish-one.service
      relation: implements
      to: pattern:dvd-ingester:T2C1.hot-cold-nas-conveyor
    - from: component:dvd-ingester:unit:dvd-ingester-ha-mqtt.service
      relation: implements
      to: pattern:dvd-ingester:T2R6.home-assistant-mqtt-bridge
