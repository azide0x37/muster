schema: 1
framework: Muster
project:
  name: dvd-ingester
  type: linux-service-appliance
  version_file: VERSION
  config_dir: /etc/dvd-ingester
  install_dir: /opt/dvd-ingester
  current_link: /opt/dvd-ingester/current
  release_dir: /opt/dvd-ingester/releases
architecture:
  summary: DVD readiness to bounded rip job, hot local handoff, and atomic cold publish.
  network_leg: none
  local_plumbing_leg: optical drive and mounted filesystem
  unreliable_local_leg: removable optical media
  lifecycle_owner: systemd
  hot_storage: /var/cache/dvd-ingester/hot
  cold_storage: configured mounted destination
  homeassistant_bridge: MQTT discovery and bounded controls
lifecycle:
  manager: systemd
  update_polling: systemd-timer
  health_check: bin/doctor.sh
patterns:
  source: https://github.com/azide0x37/muster-pattern-library/tree/main
  verified_head: 279573b65c7c72e6b3d4fb96e9d69edfc7f86aaf
  primary: T2R4.device-triggered-conveyor
  integrations:
    - T2R6.home-assistant-mqtt-bridge
  required_atoms:
    - C1.service-capsule
    - C2.persistent-tick
    - C4.lazy-resource-gate
    - C5.failure-ratchet
    - C6.lifecycle-capsule
    - R2.device-binding
    - R5.capability-mount
    - T2C1.hot-cold-nas-conveyor
    - T2C3.scheduled-herald
    - T2R6.home-assistant-mqtt-bridge
  mapping:
    device_binding:
      atom: R2.device-binding
      evidence:
        - udev/90-dvd-ingester.rules
        - systemd/dvd-rip@.service
    capability_mount:
      atom: R5.capability-mount
      evidence:
        - DEST_DIR
        - findmnt
        - src/dvd-rip-one
        - src/dvd-publish-one
    hot_cold_conveyor:
      atom: T2C1.hot-cold-nas-conveyor
      evidence:
        - HOT_DIR
        - MIN_HOT_FREE_BYTES
        - src/dvd-publish-one
    scheduled_work:
      atoms:
        - C2.persistent-tick
        - T2C3.scheduled-herald
      evidence:
        - systemd/dvd-publish-one.timer
        - systemd/dvd-ingester-doctor.timer
        - systemd/dvd-ingester-update.timer
    failure_state:
      atom: C5.failure-ratchet
      evidence:
        - capability.json
        - hot-capacity.json
        - rip.json
        - handoff.json
        - publish.json
    homeassistant_mqtt_bridge:
      atom: T2R6.home-assistant-mqtt-bridge
      evidence:
        - src/dvd-ha-mqtt-bridge
        - src/dvd-control
        - systemd/dvd-ingester-ha-mqtt.service
        - systemd/dvd-ingester-ha-mqtt.timer
        - dvd-ingester.mqtt.env
python:
  allowed: when title selection or metadata handling becomes structurally worse in shell
  required_tool: uv
release:
  artifact_prefix: dvd-ingester
  manifest: manifest.json
  checksum: sha256
compliance:
  readme_self_certification_required: true
  tests_required: true
  staged_installer_required: true
  package_required: true
